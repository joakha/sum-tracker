<div class="space-y-6">
  @for (budget of budgets(); track budget.id) {
  <div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">

    <!-- Budget General Info -->
    <div class="mb-5 flex flex-col gap-3 border-b border-gray-100 pb-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h2 class="text-xl font-semibold text-gray-900">
          {{ budget.title }}
        </h2>
        <p class="text-sm text-gray-500">
          Budget year: {{ budget.year }}
        </p>
      </div>

      <div class="rounded-lg bg-blue-50 px-4 py-2 text-right">
        <p class="text-xs font-medium uppercase text-blue-600">
          Total Budget
        </p>
        <p class="text-lg font-bold text-blue-900">
          {{ budget.total }}
        </p>
      </div>

      <div>
        <button type="button" (click)="editBudget(budget.id)">Update</button>
      </div>

      <div>
        <app-delete-button [budget]="budget" (deleteBudgetEmitter)="deleteBudget($event)"></app-delete-button>
      </div>
    </div>


    <!-- Expenses List -->
    <div>
      <h3 class="mb-3 text-sm font-semibold uppercase tracking-wide text-gray-600">
        Expenses
      </h3>

      <div class="space-y-2">
        @for (expense of budget.expenses; track expense.name) {
        <div class="flex items-center justify-between rounded-lg bg-gray-50 px-4 py-3">

          <div>
            <p class="text-sm text-gray-700">
              {{ expense.name }}
            </p>
          </div>

          <div>
            <p class="text-sm text-gray-700">
              {{ expense.month }}
            </p>
          </div>

          <div class="font-medium text-red-600">
            {{ expense.value }}
          </div>

        </div>
        }
      </div>
    </div>

  </div>
  }
</div>
